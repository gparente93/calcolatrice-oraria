<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calcolatore Uscita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        input {
            -webkit-appearance: none;
            appearance: none;
        }
        .card {
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        input:focus {
            outline: none;
            border-color: #3b82f6 !important;
        }
        /* Animazione per il banner di memoria */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-6">

    <div class="card w-full max-w-md overflow-hidden">
        <div id="saved-container" class="hidden bg-green-50 border-b border-green-100 p-4 fade-in">
            <div class="flex justify-between items-center">
                <p class="text-green-800 text-sm font-medium">
                    ✨ Oggi uscirai alle: <span id="saved-time-display" class="font-bold text-lg">--:--</span>
                </p>
                <button id="clear-saved" class="text-green-600 hover:text-green-800 text-xs font-bold uppercase tracking-tight">Cancella</button>
            </div>
        </div>

        <div class="p-6 sm:p-8">
            <header class="text-center mb-8">
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">Calcolatore Uscita</h1>
                <p class="text-sm text-gray-500 mt-1">Pianifica la tua giornata lavorativa</p>
            </header>

            <div class="space-y-6">
                <div class="flex flex-col">
                    <label for="arrival-time" class="text-sm font-semibold text-gray-600 mb-2 ml-1">Orario di Arrivo</label>
                    <input type="time" id="arrival-time" 
                           class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-lg rounded-xl block p-3 focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-600 mb-2 ml-1">Banca Ore da Scalare</label>
                    <div class="flex space-x-3">
                        <input type="number" id="banca-ore-hours" placeholder="Ore" min="0" 
                               class="w-1/2 bg-gray-50 border border-gray-300 text-gray-900 text-center text-lg rounded-xl block p-3">
                        <input type="number" id="banca-ore-minutes" placeholder="Min" min="0" max="59" 
                               class="w-1/2 bg-gray-50 border border-gray-300 text-gray-900 text-center text-lg rounded-xl block p-3">
                    </div>
                </div>
                
                <div class="relative group">
                    <div class="bg-blue-600 rounded-2xl p-6 text-center shadow-lg shadow-blue-200">
                        <p class="text-blue-100 text-xs font-medium uppercase tracking-widest">Uscita Calcolata</p>
                        <p id="exit-time" class="text-white text-5xl font-bold mt-1">--:--</p>
                    </div>
                    
                    <button id="save-btn" class="hidden absolute -bottom-4 left-1/2 -translate-x-1/2 bg-white border border-blue-200 text-blue-600 px-6 py-2 rounded-full text-sm font-bold shadow-md hover:bg-blue-50 active:scale-95 transition-all">
                        📌 Memorizza Orario
                    </button>
                </div>
            </div>

            <footer class="mt-12 text-center">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Base: 8 ore e 30 minuti</p>
            </footer>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const arrivalInput = document.getElementById('arrival-time');
            const hoursInput = document.getElementById('banca-ore-hours');
            const minsInput = document.getElementById('banca-ore-minutes');
            const exitDisplay = document.getElementById('exit-time');
            const saveBtn = document.getElementById('save-btn');
            const savedContainer = document.getElementById('saved-container');
            const savedTimeDisplay = document.getElementById('saved-time-display');
            const clearBtn = document.getElementById('clear-saved');

            // 1. Carica orario salvato all'avvio
            const checkSavedTime = () => {
                const saved = localStorage.getItem('orarioUscita');
                if (saved) {
                    savedTimeDisplay.textContent = saved;
                    savedContainer.classList.remove('hidden');
                } else {
                    savedContainer.classList.add('hidden');
                }
            };

            const calculateExitTime = () => {
                const BASE_WORK_MINUTES = 510;
                const arrivalValue = arrivalInput.value;
                const bHours = parseInt(hoursInput.value) || 0;
                const bMinutes = parseInt(minsInput.value) || 0;

                if (!arrivalValue) {
                    exitDisplay.textContent = '--:--';
                    saveBtn.classList.add('hidden');
                    return;
                }

                const [h, m] = arrivalValue.split(':').map(Number);
                const arrivalTotal = h * 60 + m;
                const bancaTotal = bHours * 60 + bMinutes;
                const exitTotal = (arrivalTotal + (BASE_WORK_MINUTES - bancaTotal) + 1440) % 1440;

                const resH = String(Math.floor(exitTotal / 60)).padStart(2, '0');
                const resM = String(exitTotal % 60).padStart(2, '0');
                const finalTime = `${resH}:${resM}`;

                exitDisplay.textContent = finalTime;
                saveBtn.classList.remove('hidden'); // Mostra il tasto quando c'è un risultato
            };

            // Evento salvataggio
            saveBtn.addEventListener('click', () => {
                const timeToSave = exitDisplay.textContent;
                localStorage.setItem('orarioUscita', timeToSave);
                checkSavedTime();
                
                // Feedback visivo rapido sul bottone
                saveBtn.textContent = '✅ Salvato!';
                setTimeout(() => { saveBtn.textContent = '📌 Memorizza Orario'; }, 2000);
            });

            // Evento cancella
            clearBtn.addEventListener('click', () => {
                localStorage.removeItem('orarioUscita');
                checkSavedTime();
            });

            [arrivalInput, hoursInput, minsInput].forEach(el => 
                el.addEventListener('input', calculateExitTime)
            );

            checkSavedTime();
        });
    </script>
</body>
</html>
