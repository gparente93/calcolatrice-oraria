<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeOut Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        input[type="time"] {
            color: #1e293b !important;
            min-height: 1.5rem;
            background: transparent;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .app-shadow {
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.1), 0 10px 10px -5px rgba(59, 130, 246, 0.04);
        }
        .active-ring {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-5">

    <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden app-shadow border border-blue-50">
        
        <div id="saved-container" class="hidden bg-indigo-600 px-6 py-3 transition-all">
            <div class="flex justify-between items-center text-white">
                <p class="text-xs font-semibold uppercase tracking-wider">
                    Uscita Memorizzata: <span id="saved-time-display" class="ml-1 text-sm font-bold">--:--</span>
                </p>
                <button id="clear-saved" class="text-[10px] bg-white/20 px-2 py-1 rounded-md font-bold uppercase hover:bg-white/30">Reset</button>
            </div>
        </div>

        <div class="p-8">
            <h1 class="text-xl font-extrabold text-slate-800 mb-8 flex items-center justify-between">
                <div class="flex items-center">
                    <span class="bg-indigo-600 text-white p-2 rounded-lg mr-3 shadow-lg shadow-indigo-200">🕒</span>
                    TimeOut
                </div>
                <span id="status-dot" class="h-2 w-2 rounded-full bg-slate-300"></span>
            </h1>

            <div class="space-y-6">
                <div>
                    <label class="text-[11px] font-bold text-indigo-400 uppercase tracking-widest ml-1 mb-2 block">Orario di Ingresso</label>
                    <div class="flex items-center bg-slate-50 border-2 border-slate-100 rounded-2xl px-4 py-4 focus-within:border-indigo-500 focus-within:bg-white transition-all">
                        <input type="time" id="arrival-time" class="w-full text-xl font-bold text-slate-700 outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-indigo-400 uppercase tracking-widest ml-1 mb-2 block">Recupero Banca Ore</label>
                    <div class="flex space-x-3">
                        <input type="number" id="banca-ore-hours" placeholder="Ore" 
                               class="w-1/2 bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-bold text-slate-700 focus:border-indigo-500 focus:bg-white outline-none transition-all">
                        <input type="number" id="banca-ore-minutes" placeholder="Minuti" 
                               class="w-1/2 bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-bold text-slate-700 focus:border-indigo-500 focus:bg-white outline-none transition-all">
                    </div>
                </div>

                <div class="bg-indigo-50 border border-indigo-100 rounded-[2.5rem] p-8 text-center relative mt-4">
                    <p class="text-indigo-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Fine turno prevista</p>
                    
                    <div class="flex items-center justify-center relative">
                        <button id="notify-btn" class="hidden absolute left-[-15px] p-3 text-2xl hover:scale-110 active:scale-95 transition-all outline-none" title="Attiva Notifica">
                            <span id="notify-icon">🔔</span>
                        </button>

                        <span id="exit-time" class="text-indigo-900 text-6xl font-[900] tracking-tighter">--:--</span>
                        
                        <button id="save-btn" class="hidden absolute right-[-15px] p-3 text-2xl hover:scale-110 active:scale-95 transition-all outline-none" title="Salva">
                            <span id="save-icon">💾</span>
                        </button>
                    </div>
                </div>
            </div>

            <p class="text-center text-[10px] text-slate-300 font-bold mt-10 uppercase tracking-[0.3em]">Turno standard 8.5h</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = {
                arrival: document.getElementById('arrival-time'),
                bH: document.getElementById('banca-ore-hours'),
                bM: document.getElementById('banca-ore-minutes'),
                exit: document.getElementById('exit-time'),
                saveBtn: document.getElementById('save-btn'),
                saveIcon: document.getElementById('save-icon'),
                notifyBtn: document.getElementById('notify-btn'),
                notifyIcon: document.getElementById('notify-icon'),
                savedContainer: document.getElementById('saved-container'),
                savedDisplay: document.getElementById('saved-time-display'),
                clearBtn: document.getElementById('clear-saved'),
                statusDot: document.getElementById('status-dot')
            };

            const updateUI = () => {
                const saved = localStorage.getItem('work_exit_time');
                if (saved) {
                    elements.savedDisplay.textContent = saved;
                    elements.savedContainer.classList.remove('hidden');
                } else {
                    elements.savedContainer.classList.add('hidden');
                }
            };

            const calculate = () => {
                const arrival = elements.arrival.value;
                if (!arrival) {
                    elements.exit.textContent = '--:--';
                    elements.saveBtn.classList.add('hidden');
                    elements.notifyBtn.classList.add('hidden');
                    return;
                }

                const h = parseInt(elements.bH.value) || 0;
                const m = parseInt(elements.bM.value) || 0;
                
                const [arrH, arrM] = arrival.split(':').map(Number);
                const totalMinutes = (arrH * 60 + arrM) + (510 - (h * 60 + m));
                const normMinutes = (totalMinutes + 1440) % 1440;

                const finalTime = `${String(Math.floor(normMinutes / 60)).padStart(2, '0')}:${String(normMinutes % 60).padStart(2, '0')}`;
                
                elements.exit.textContent = finalTime;
                elements.saveBtn.classList.remove('hidden');
                elements.notifyBtn.classList.remove('hidden');
            };

            // Logica Notifiche
            elements.notifyBtn.addEventListener('click', async () => {
                if (!("Notification" in window)) {
                    alert("Questo browser non supporta le notifiche.");
                    return;
                }

                let permission = Notification.permission;
                if (permission !== "granted") {
                    permission = await Notification.requestPermission();
                }

                if (permission === "granted") {
                    elements.notifyIcon.textContent = '🔕';
                    elements.statusDot.classList.replace('bg-slate-300', 'bg-green-500');
                    alert("Notifica attivata per le " + elements.exit.textContent + ". Tieni la scheda aperta o aggiungi alla Home.");
                    
                    // Controllo ogni 30 secondi
                    setInterval(() => {
                        const now = new Date();
                        const nowStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                        if (nowStr === elements.exit.textContent) {
                            new Notification("TimeOut!", {
                                body: "È ora di staccare! Buona serata! 🏃‍♂️",
                                icon: "https://cdn-icons-png.flaticon.com/512/833/833539.png"
                            });
                            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                        }
                    }, 30000);
                }
            });

            elements.saveBtn.addEventListener('click', () => {
                localStorage.setItem('work_exit_time', elements.exit.textContent);
                updateUI();
                elements.saveIcon.textContent = '✅';
                setTimeout(() => elements.saveIcon.textContent = '💾', 1500);
            });

            elements.clearBtn.addEventListener('click', () => {
                localStorage.removeItem('work_exit_time');
                updateUI();
            });

            [elements.arrival, elements.bH, elements.bM].forEach(el => el.addEventListener('input', calculate));
            updateUI();
        });
    </script>
</body>
</html>
