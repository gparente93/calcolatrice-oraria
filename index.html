<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calcolatore Uscita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        input { -webkit-appearance: none; appearance: none; }
        .glass-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }
        .input-focus-effect:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-md overflow-hidden border border-gray-100">
        <div id="saved-container" class="hidden bg-blue-600 p-4 text-white">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <span class="text-xs font-medium uppercase tracking-wider opacity-80">Promemoria:</span>
                    <span id="saved-time-display" class="text-lg font-bold">--:--</span>
                </div>
                <button id="clear-saved" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-xs transition-colors">Rimuovi</button>
            </div>
        </div>

        <div class="p-8">
            <header class="mb-8 text-center">
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">TimeOut</h1>
                <p class="text-gray-400 text-sm">Calcola la fine del turno</p>
            </header>

            <div class="space-y-8">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Ingresso</label>
                    <div class="input-focus-effect flex items-center bg-gray-50 border border-gray-200 rounded-2xl p-4 transition-all">
                        <span class="text-xl mr-3">🕒</span>
                        <input type="time" id="arrival-time" 
                               class="bg-transparent w-full text-xl font-semibold text-gray-700 focus:outline-none">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Recupero Banca Ore</label>
                    <div class="flex space-x-3">
                        <input type="number" id="banca-ore-hours" placeholder="00 ore" 
                               class="w-1/2 bg-gray-50 border border-gray-200 rounded-2xl p-4 text-center font-medium focus:outline-none focus:border-blue-400 transition-colors">
                        <input type="number" id="banca-ore-minutes" placeholder="00 min" 
                               class="w-1/2 bg-gray-50 border border-gray-200 rounded-2xl p-4 text-center font-medium focus:outline-none focus:border-blue-400 transition-colors">
                    </div>
                </div>

                <div class="bg-slate-900 rounded-[2rem] p-8 text-center relative shadow-xl">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mb-2">Uscita stimata</p>
                    
                    <div class="flex items-center justify-center space-x-4">
                        <span id="exit-time" class="text-white text-6xl font-black tracking-tighter">--:--</span>
                        
                        <button id="save-btn" class="hidden text-3xl hover:scale-110 active:scale-90 transition-transform focus:outline-none" title="Memorizza">
                            <span id="save-icon">💾</span>
                        </button>
                    </div>
                </div>
            </div>

            <p class="text-center text-[10px] text-gray-300 mt-10 uppercase tracking-widest font-bold">Turno standard: 8.5h</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const arrivalInput = document.getElementById('arrival-time');
            const hoursInput = document.getElementById('banca-ore-hours');
            const minsInput = document.getElementById('banca-ore-minutes');
            const exitDisplay = document.getElementById('exit-time');
            const saveBtn = document.getElementById('save-btn');
            const saveIcon = document.getElementById('save-icon');
            const savedContainer = document.getElementById('saved-container');
            const savedTimeDisplay = document.getElementById('saved-time-display');
            const clearBtn = document.getElementById('clear-saved');

            const checkSavedTime = () => {
                const saved = localStorage.getItem('orarioUscita');
                if (saved) {
                    savedTimeDisplay.textContent = saved;
                    savedContainer.classList.remove('hidden');
                } else {
                    savedContainer.classList.add('hidden');
                }
            };

            const calculateExitTime = () => {
                const BASE_MINUTES = 510;
                const arrival = arrivalInput.value;
                const bH = parseInt(hoursInput.value) || 0;
                const bM = parseInt(minsInput.value) || 0;

                if (!arrival) {
                    exitDisplay.textContent = '--:--';
                    saveBtn.classList.add('hidden');
                    return;
                }

                const [h, m] = arrival.split(':').map(Number);
                const arrivalTotal = h * 60 + m;
                const exitTotal = (arrivalTotal + (BASE_MINUTES - (bH * 60 + bM)) + 1440) % 1440;

                const finalTime = `${String(Math.floor(exitTotal / 60)).padStart(2, '0')}:${String(exitTotal % 60).padStart(2, '0')}`;

                exitDisplay.textContent = finalTime;
                saveBtn.classList.remove('hidden');
            };

            saveBtn.addEventListener('click', () => {
                localStorage.setItem('orarioUscita', exitDisplay.textContent);
                checkSavedTime();
                
                // Animazione icona
                saveIcon.textContent = '✅';
                setTimeout(() => { saveIcon.textContent = '💾'; }, 1500);
            });

            clearBtn.addEventListener('click', () => {
                localStorage.removeItem('orarioUscita');
                checkSavedTime();
            });

            [arrivalInput, hoursInput, minsInput].forEach(el => 
                el.addEventListener('input', calculateExitTime)
            );

            checkSavedTime();
        });
    </script>
</body>
</html>
