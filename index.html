<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calcolatore Uscita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        /* Forza il colore dell'input time su iOS */
        input[type="time"] {
            color: #1e293b !important;
            min-height: 1.5rem;
            background: transparent;
        }
        /* Nasconde le freccette standard degli input numerici */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .app-shadow {
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1), 0 8px 10px -6px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-5">

    <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden app-shadow border border-blue-50">
        
        <div id="saved-container" class="hidden bg-indigo-600 px-6 py-3 transition-all">
            <div class="flex justify-between items-center text-white">
                <p class="text-xs font-semibold uppercase tracking-wider">
                    Uscita fissata: <span id="saved-time-display" class="ml-1 text-sm font-bold">--:--</span>
                </p>
                <button id="clear-saved" class="text-[10px] bg-white/20 px-2 py-1 rounded-md font-bold uppercase">Reset</button>
            </div>
        </div>

        <div class="p-8">
            <h1 class="text-xl font-extrabold text-slate-800 mb-8 flex items-center">
                <span class="bg-indigo-600 text-white p-2 rounded-lg mr-3">🕒</span>
                Orario Lavoro
            </h1>

            <div class="space-y-6">
                <div class="relative group">
                    <label class="text-[11px] font-bold text-indigo-400 uppercase tracking-widest ml-1 mb-2 block">Orario di Ingresso</label>
                    <div class="flex items-center bg-slate-50 border-2 border-slate-100 rounded-2xl px-4 py-4 focus-within:border-indigo-500 focus-within:bg-white transition-all">
                        <input type="time" id="arrival-time" 
                               class="w-full text-xl font-bold text-slate-700 outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-indigo-400 uppercase tracking-widest ml-1 mb-2 block">Recupero Banca Ore</label>
                    <div class="flex space-x-3">
                        <input type="number" id="banca-ore-hours" placeholder="Ore" 
                               class="w-1/2 bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-bold text-slate-700 focus:border-indigo-500 focus:bg-white outline-none transition-all">
                        <input type="number" id="banca-ore-minutes" placeholder="Minuti" 
                               class="w-1/2 bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center font-bold text-slate-700 focus:border-indigo-500 focus:bg-white outline-none transition-all">
                    </div>
                </div>

                <div class="bg-indigo-50 border border-indigo-100 rounded-[2rem] p-8 text-center relative mt-4">
                    <p class="text-indigo-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Fine turno prevista</p>
                    
                    <div class="flex items-center justify-center relative">
                        <span id="exit-time" class="text-indigo-900 text-6xl font-black tracking-tighter">--:--</span>
                        
                        <button id="save-btn" class="hidden absolute right-[-10px] top-0 p-2 text-2xl hover:scale-110 active:scale-90 transition-transform" title="Salva">
                            <span id="save-icon">💾</span>
                        </button>
                    </div>
                </div>
            </div>

            <footer class="mt-8 text-center">
                <p class="text-[10px] text-slate-300 font-medium uppercase tracking-widest">Configurato su 8 ore e 30 minuti</p>
            </footer>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const arrivalInput = document.getElementById('arrival-time');
            const hInput = document.getElementById('banca-ore-hours');
            const mInput = document.getElementById('banca-ore-minutes');
            const exitDisplay = document.getElementById('exit-time');
            const saveBtn = document.getElementById('save-btn');
            const saveIcon = document.getElementById('save-icon');
            const savedContainer = document.getElementById('saved-container');
            const savedTimeDisplay = document.getElementById('saved-time-display');
            const clearBtn = document.getElementById('clear-saved');

            const updateUI = () => {
                const saved = localStorage.getItem('work_exit_time');
                if (saved) {
                    savedTimeDisplay.textContent = saved;
                    savedContainer.classList.remove('hidden');
                } else {
                    savedContainer.classList.add('hidden');
                }
            };

            const calculate = () => {
                const arrival = arrivalInput.value;
                if (!arrival) {
                    exitDisplay.textContent = '--:--';
                    saveBtn.classList.add('hidden');
                    return;
                }

                const bH = parseInt(hInput.value) || 0;
                const bM = parseInt(mInput.value) || 0;
                
                // 8h 30m = 510 minuti
                const [h, m] = arrival.split(':').map(Number);
                const totalMinutes = (h * 60 + m) + (510 - (bH * 60 + bM));
                const normalizedMinutes = (totalMinutes + 1440) % 1440;

                const resH = String(Math.floor(normalizedMinutes / 60)).padStart(2, '0');
                const resM = String(normalizedMinutes % 60).padStart(2, '0');
                
                exitDisplay.textContent = `${resH}:${resM}`;
                saveBtn.classList.remove('hidden');
            };

            saveBtn.addEventListener('click', () => {
                localStorage.setItem('work_exit_time', exitDisplay.textContent);
                updateUI();
                saveIcon.textContent = '✅';
                setTimeout(() => saveIcon.textContent = '💾', 1500);
            });

            clearBtn.addEventListener('click', () => {
                localStorage.removeItem('work_exit_time');
                updateUI();
            });

            [arrivalInput, hInput, mInput].forEach(el => el.addEventListener('input', calculate));
            updateUI();
        });
    </script>
</body>
</html>
